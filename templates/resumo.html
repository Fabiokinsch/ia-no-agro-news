<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --verde:#152C24; --lima:#92BA35; --creme:#F7FBE0; }
  body { width:1080px; height:1350px; background:var(--verde);
    font-family:'Montserrat',sans-serif; color:var(--creme);
    display:flex; flex-direction:column; padding:84px 88px 72px; }
  .topo { display:flex; justify-content:space-between; align-items:baseline; }
  .selo { font-weight:800; font-size:24px; letter-spacing:.22em; color:var(--lima); }
  .contador { font-family:ui-monospace,'Courier New',monospace; font-size:22px; color:rgba(247,251,224,.55); }
  h1 { margin-top:64px; font-weight:800; font-size:60px; letter-spacing:-0.01em; }
  .lista { margin-top:48px; display:flex; flex-direction:column; }
  .item { display:flex; gap:26px; padding:30px 0; border-bottom:1px solid rgba(247,251,224,.14); align-items:baseline; }
  .item span { font-family:ui-monospace,'Courier New',monospace; font-size:19px; letter-spacing:.22em;
    color:var(--lima); min-width:190px; }
  .item p { font-weight:600; font-size:33px; line-height:1.3; }
  .salvar { margin-top:auto; font-weight:300; font-style:italic; font-size:30px; color:var(--lima); }
  .rodape { margin-top:32px; padding-top:24px; border-top:1px solid rgba(247,251,224,.18);
    display:flex; justify-content:space-between;
    font-family:ui-monospace,'Courier New',monospace; font-size:22px; color:rgba(247,251,224,.6); }
</style>
</head>
<body>
  <div class="topo"><div class="selo">IA NO AGRO NEWS</div><div class="contador">07 / 08</div></div>
  <h1>O resumo de hoje</h1>
  <div class="lista">{{ITENS}}</div>
  <p class="salvar">→ Salva este slide. Amanhã tem outro.</p>
  <div class="rodape"><span>FONTES NA LEGENDA</span><span>{{DATA}}</span></div>
</body>
</html>
