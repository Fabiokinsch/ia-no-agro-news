<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root { --verde:#152C24; --lima:#92BA35; --creme:#F7FBE0; }
  body { width:1080px; height:1350px; background:var(--verde);
    font-family:'Montserrat',sans-serif; color:var(--creme);
    display:flex; flex-direction:column; padding:84px 88px 72px; }
  .topo { display:flex; justify-content:space-between; align-items:baseline; }
  .selo { font-weight:800; font-size:24px; letter-spacing:.22em; color:var(--lima); }
  .contador { font-family:ui-monospace,'Courier New',monospace; font-size:22px; color:rgba(247,251,224,.55); }
  .etapa { margin-top:88px; display:flex; align-items:center; gap:20px; }
  .etapa .traco { width:44px; height:4px; background:var(--lima); }
  .etapa span { font-family:ui-monospace,'Courier New',monospace; font-size:25px; letter-spacing:.3em; color:var(--lima); }
  h1 { margin-top:32px; font-weight:800; font-size:62px; line-height:1.1; letter-spacing:-0.01em; }
  .corpo { margin-top:40px; font-weight:400; font-size:36px; line-height:1.5; color:rgba(247,251,224,.88); }
  .loop { margin-top:auto; font-weight:300; font-style:italic; font-size:29px; color:rgba(146,186,53,.95); }
  .rodape { margin-top:34px; padding-top:24px; border-top:1px solid rgba(247,251,224,.18);
    display:flex; justify-content:space-between;
    font-family:ui-monospace,'Courier New',monospace; font-size:22px; color:rgba(247,251,224,.6); }
</style>
</head>
<body>
  <div class="topo"><div class="selo">IA NO AGRO NEWS · DOSSIÊ</div><div class="contador">{{CONTADOR}}</div></div>
  <div class="etapa"><div class="traco"></div><span>{{ETAPA}}</span></div>
  <h1>{{TITULO}}</h1>
  <p class="corpo">{{CORPO}}</p>
  <p class="loop">→ {{LOOP}}</p>
  <div class="rodape"><span>{{FONTE}}</span><span>{{DATA}}</span></div>
</body>
</html>
